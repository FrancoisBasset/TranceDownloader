<!DOCTYPE html>
<html>
	<head>
		<title>TranceDownloader | Mes artistes</title>
		<link rel="manifest" href="Manifest.json">
		<style>
			* {
				font-family: monospace;
			}

			body {
				margin: 0px;
			}

			::-webkit-scrollbar {
				width: 0;
			}

			label {
				color: white;
			}

			#gridDiv {
				position: absolute;
				width: 50%;
				height: 100%;

				background-color: rgb(61, 25, 8);

				cursor: pointer;
				overflow: scroll;
			}

			#bar {
				width: 100%;
				height: 5%;

				display: inline-flex;
			}

			#backButton {
				width: 20%;
				height: 100%;
				color: white;
				border: none;
				outline: none;

				cursor: pointer;
			}

			#headLabel {
				width: 80%;
				padding-top: 12px;
				text-align: center;

				font-size: 20px;
				vertical-align: middle;
			}

			#trackDiv {
				position: absolute;
				width: 50%;
				right: 0;
				height: 100%;

				text-align: center;
			}

			#audioDiv {
				height: 40%;
				background-color: rgb(42, 6, 63);
			}

			#audio {
				outline: none;
				color:rgb(5, 51, 39);
			}

			#definitionsDiv {
				height: 60%;
				background-color: rgb(5, 51, 39);
				padding-top: 10px;
			}

			#definitionsSelect {
				width: 40%;
				color: white;
				background-color: rgb(40, 40, 40);
				border: none;
				border-radius: 20px;
				outline: none;
				padding: 10px;
			}

			#valueInput {
				width: 200px;
				height: 40px;
				outline: none;
			}

			#updateButton {
				width: 150px;
				height: 40px;
				font-size: 20px;
				cursor: pointer;
			}
		</style>
	</head>

	<body id="index">
		<div id="gridDiv" class="scroll">
			<div id="bar" class="scroll">
				<button id="backButton" class="scroll">◀</button>
				<label id="headLabel" class="scroll">Genres</label>
			</div>
			<div id="genresDiv" class="scroll"></div>
		</div>

		<div id="trackDiv">
			<div id="audioDiv">
				<audio id="audio" controls></audio>
			</div>
			<div id="definitionsDiv">
				<label style="font-size: 20px;">Définitions :</label><br>
				<select id="definitionsSelect" class="scroll" size="20" onclick="showTagValue()"></select><br><br>
				<input type="text" id="valueInput" /><br><br>
				<button id="updateButton" onclick="updateTrack()">Enregistrer</button>
			</div>
		</div>
	</body>
</html>

<script src="js/scroll.js"></script>
<script>
	if (script1 == undefined) {
		var script1 = document.createElement('script');
		script1.src = 'js/TrackSelector.js';
		document.body.appendChild(script1);
	}
	
	script1 = document.createElement('script');
	script1.src = 'js/index.js';
	document.body.appendChild(script1);

	if('serviceWorker' in navigator) {
		navigator.serviceWorker.register('./sw.js');
	};
</script>
