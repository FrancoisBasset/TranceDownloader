<!DOCTYPE html>
<html>
	<head>
		<title>TranceDownloader | Mes envies</title>
		<link rel="stylesheet" href="css/wishes.css" />
	</head>

	<body>
		<div>
			<img src="favicon.ico" width="100" height="100" />
			<a href="library.html">Ma bibliothèque</a>
			<a href="youtube.html">YouTube</a>
			<a href="wishes.html">Mes envies</a>
		</div>
		
		<div id="wishesDiv">
			<h1>Mes envies</h1>

			<table id="wishesTable">
				<thead>
					<td>Artiste</td>
					<td>Track</td>
				</thead>
				<tbody></tbody>
			</table>
		</div>

		<div id="addDiv">
			<h1>Ajouter</h1>

			<label>Artiste : </label><input type="text" id="artistInputAdd" />
			<br>

			<label>Track : </label><input type="text" id="trackInputAdd" />
			<br>

			<button onclick="addWish()">Ajouter</button>
		</div>

		<div id="updateDiv">
			<h1>Modifier</h1>
			<select onchange="updateForm()" id="wishesSelect"></select>
			<br><br>

			<label>Artiste : </label><input type="text" id="artistInputUpdate" /><br>
			<label>Track : </label><input type="text" id="trackInputUpdate" /><br>
			<button onclick="updateWish()">Modifier</button><br>
			<button onclick="backWish()" id="backButton">Back</button>
		</div>

	</body>
</html>
