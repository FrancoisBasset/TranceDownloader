<!DOCTYPE html>
<html>
	<head>
		<title>TranceDownloader | Mes artistes</title>
		<style>
			* {
				font-family: monospace;
			}

			body {
				margin: 0px;
			}

			::-webkit-scrollbar {
				width: 0;
			}

			#gridDiv {
				position: absolute;
				width: 50%;
				height: 100%;

				background-color: black;

				cursor: pointer;
				overflow: scroll;
			}

			#bar {
				width: 100%;
				height: 5%;

				display: inline-flex;
			}

			#backButton {
				width: 20%;
				height: 100%;

				color: white;
				border: none;
				outline: none;

				cursor: pointer;
			}

			#headLabel {
				width: 80%;
				padding-top: 12px;
				text-align: center;

				color: white;
				font-size: 20px;
				vertical-align: middle;
			}

			#trackDiv {
				position: absolute;
				width: 50%;
				right: 0;
				height: 100%;

				background-color: white;
			}

			#audioDiv {
				height: 50%;
			}

			#definitionsDiv {
				height: 50%;
			}
		</style>
	</head>

	<body id="scroll1">
		<div id="gridDiv" class="scroll">
			<div id="bar" class="scroll">
				<button id="backButton" class="scroll">◀</button>
				<label id="headLabel" class="scroll">Genres</label>
			</div>
			<div id="genresDiv" class="scroll"></div>
		</div>

		<div id="trackDiv">
			<div id="audioDiv">
				<audio id="audio" controls></audio>
			</div>
			<div id="definitionsDiv" style="text-align: center;">
				<label>Définitions :</label><br>
				<select id="definitionsSelect" class="scroll" size="20" style="width: 40%" onclick="showTagValue()"></select><br>
				<input type="text" id="valueInput" /><br>
				<button id="updateButton" onclick="updateTrack()">Enregistrer</button>
			</div>
		</div>
	</body>
</html>

<script src="/js/scroll.js"></script>
<script>
	if (script1 == undefined) {
		var script1 = document.createElement('script');
		script1.src = '/js/TrackSelector.js';
		document.body.appendChild(script1);
	}
	
	script1 = document.createElement('script');
	script1.src = '/js/scroll1.js';
	document.body.appendChild(script1);
</script>
