<!DOCTYPE html>
<html>
	<head>
		<title>TranceDownloader | Mes envies</title>
		<style>
			body {
				background-color: green;
			}
		</style>
	</head>

	<body>
		SCROLL 3
	</body>
</html>

<script>
	document.addEventListener('wheel', function(e) {
		if (e.deltaY < 0) {
			fetch('/scroll2.html').then(function(res) {
				res.text().then(function(html) {
					document.open();
					document.write(html);
					document.close();
				});
			});
		}
	});
</script>
