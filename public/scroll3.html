<!DOCTYPE html>
<html>
	<head>
		<title>TranceDownloader | Mes envies</title>
		<style>
			body {
				margin: 0px;
			}

			#wishesDiv {
				position: absolute;
				width: 50%;
				height: 100%;

				background-color: rgb(66, 19, 19);
			}

			#addDiv {
				position: absolute;
				width: 50%;
				height: 50%;
				right: 0;

				background-color: rgb(13, 54, 23);
			}

			#updateDiv {
				position: absolute;
				width: 50%;
				height: 50%;
				top: 50%;
				right: 0;

				background-color: rgb(80, 46, 8);
			}
		</style>
	</head>

	<body id="scroll3">
		<div id="wishesDiv">
			<h1>Mes envies</h1>

			<table id="wishesTable">
				<thead>
					<td>Artiste</td>
					<td>Track</td>
				</thead>
				<tbody></tbody>
			</table>
		</div>

		<div id="addDiv">
			<h1>Ajouter</h1>

			<label>Artiste : </label>
			<input type="text" id="artistInputAdd" />
			<br>

			<label>Track : </label>
			<input type="text" id="trackInputAdd" />
			<br>

			<button onclick="addWish()">Ajouter</button>
		</div>

		<div id="updateDiv">
			<h1>Modifier</h1>
			<select onchange="updateForm()" id="wishesSelect"></select>
			<br>

			<input type="text" id="artistInputUpdate" />
			<input type="text" id="trackInputUpdate" />
			<button onclick="updateWish()">Modifier</button>
			<button onclick="backWish()" id="backButton">Back</button>
		</div>

	</body>
</html>

<script src="/js/scroll.js"></script>
<script>
	if (script3 == undefined) {
		var script3;

		script3 = document.createElement('script');
		script3.src = '/js/WishesTable.js';
		document.body.appendChild(script3);

		script3 = document.createElement('script');
		script3.src = '/js/WishesSelect.js';
		document.body.appendChild(script3);
	}

	script3 = document.createElement('script');
	script3.src = '/js/scroll3.js';
	document.body.appendChild(script3);
</script>
