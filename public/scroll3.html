<!DOCTYPE html>
<html>
	<head>
		<title>TranceDownloader | Mes envies</title>
	</head>

	<body id="scroll3">
		<h1>Mes envies</h1>

		<table id="wishesTable">
			<thead>
				<td>Artiste</td>
				<td>Track</td>
				<td>Fait ?</td>
			</thead>
			<tbody>
			</tbody>
		</table>

		<hr>

		<h1>Ajouter</h1>

		<label>Artiste : </label>
		<input type="text" id="artistInput" />
		<br>

		<label>Track : </label>
		<input type="text" id="trackInput" />
		<br>

		<button onclick="addWish()">Ajouter</button>

	</body>
</html>

<script src="/scroll.js"></script>
<script>
	var wishesTable = document.getElementById('wishesTable').getElementsByTagName('tbody')[0];
	var artistInput = document.getElementById('artistInput');
	var trackInput = document.getElementById('trackInput');
	
	fetch('/wishes').then(function(response) {
		response.json().then(function(json) {
			for (const wish of json.response) {
				const row = wishesTable.insertRow();
				row.id = 'wish-' + wish.id;
				row.insertCell().innerText = wish.artist;
				row.insertCell().innerText = wish.track;
				
				if (wish.done) {
					row.insertCell().innerHTML = '<input type="checkbox" onclick="return false" checked />';
				} else {
					row.insertCell().innerHTML = '<input type="checkbox" onclick="return false" />';
				}

				row.insertCell().innerHTML = `<button onclick="searchWish('${wish.artist}', '${wish.track}')">Rechercher</button>`;
				row.insertCell().innerHTML = `<button onclick="doneWish(${wish.id})">Done</button>`;
			}
		});
	});

	function searchWish(artist, track) {
		console.log('Search ' + artist + ' ' + track + ' on youtube');
	}

	function doneWish(id) {
		fetch('/wishes/done/' + id, {
			method: 'PUT'
		}).then(function(response) {
			document.getElementById('wish-' + id).remove();
		});
	}

	function addWish() {
		fetch('/wishes', {
			method: 'POST',
			headers: {
				'Accept': 'application/json',
				'Content-Type': 'application/json'
			},
			body: JSON.stringify({
				artist: artistInput.value,
				track: trackInput.value
			})
		}).then(function(response) {
			response.json().then(function(json) {
				artistInput.value = '';
				trackInput.value = '';

				const row = wishesTable.insertRow();
				row.id = 'wish-' + json.response.id;
				console.log(json);
				row.insertCell().innerText = json.response.artist;
				row.insertCell().innerText = json.response.track;
				
				if (json.response.done) {
					row.insertCell().innerHTML = '<input type="checkbox" onclick="return false" checked />';
				} else {
					row.insertCell().innerHTML = '<input type="checkbox" onclick="return false" />';
				}

				row.insertCell().innerHTML = `<button onclick="searchWish('${json.response.artist}', '${json.response.track}')">Rechercher</button>`;
				row.insertCell().innerHTML = `<button onclick="doneWish(${json.response.id})">Done</button>`;
			});
		});
	}
</script>
