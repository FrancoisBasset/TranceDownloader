<!DOCTYPE html>
<html>
	<head>
		<title>TranceDownloader | Mes envies</title>
		<style>
			* {
				font-family: monospace;
			}

			body {
				margin: 0px;
			}

			#wishesDiv {
				position: absolute;
				width: 50%;
				height: 100%;

				background-color: rgb(66, 19, 19);
				padding-left: 10%;
				overflow: scroll;
				overflow-x: hidden;
			}

			#addDiv {
				position: absolute;
				width: 50%;
				height: 50%;
				right: 0;

				background-color: rgb(13, 54, 23);
				text-align: center;
			}

			#updateDiv {
				position: absolute;
				width: 50%;
				height: 50%;
				top: 50%;
				right: 0;

				background-color: rgb(80, 46, 8);
				text-align: center;
			}

			input[type="text"] {
				width: 300px;
				height: 30px;
				border-radius: 10px;
				border: none;
				margin: 2px;
			}

			label, h1, table {
				color: white;
			}

			button {
				width: 150px;
				height: 30px;
				border: none;
				border-radius: 5px;
				font-size: 16px;
				margin: 2px;
				cursor: pointer;
			}
		</style>
	</head>

	<body id="scroll3">
		<div id="wishesDiv" class="scroll">
			<h1>Mes envies</h1>

			<table id="wishesTable" class="scroll">
				<thead class="scroll">
					<td class="scroll">Artiste</td>
					<td class="scroll">Track</td>
				</thead>
				<tbody class="scroll"></tbody>
			</table>
		</div>

		<div id="addDiv">
			<h1>Ajouter</h1>

			<label>Artiste : </label><input type="text" id="artistInputAdd" />
			<br>

			<label>Track : </label><input type="text" id="trackInputAdd" />
			<br>

			<button onclick="addWish()">Ajouter</button>
		</div>

		<div id="updateDiv">
			<h1>Modifier</h1>
			<select onchange="updateForm()" id="wishesSelect"></select>
			<br><br>

			<label>Artiste : </label><input type="text" id="artistInputUpdate" /><br>
			<label>Track : </label><input type="text" id="trackInputUpdate" /><br>
			<button onclick="updateWish()">Modifier</button><br>
			<button onclick="backWish()" id="backButton">Back</button>
		</div>

	</body>
</html>

<script src="/js/scroll.js"></script>
<script>
	if (script3 == undefined) {
		var script3;

		script3 = document.createElement('script');
		script3.src = '/js/WishesTable.js';
		document.body.appendChild(script3);

		script3 = document.createElement('script');
		script3.src = '/js/WishesSelect.js';
		document.body.appendChild(script3);
	}

	script3 = document.createElement('script');
	script3.src = '/js/scroll3.js';
	document.body.appendChild(script3);
</script>
