<!DOCTYPE html>
<html>
	<head>
		<title>TranceDownloader | Ma bibliothèque</title>
		<link rel="manifest" href="Manifest.json">
		<link rel="stylesheet" href="css/index.css" />
		<link rel="stylesheet" href="css/library.css" />
	</head>

	<body>
		<div id="menuDiv">
			<a href="library.html"><img src="favicon.ico" height="100%" /></a>
			<a href="youtube.html"><img src="youtube.png" height="100%" ></a>
			<a href="wishes.html"><img src="wishes.png" height="100%" ></a>
		</div>

		<div id="gridDiv">
			<div id="bar">
				<button id="backButton">◀</button>
				<label id="headLabel">Genres</label>
			</div>
			<div id="genresDiv"></div>
		</div>

		<div id="trackDiv">
			<div id="audioDiv">
				<audio id="audio" controls></audio>
			</div>
			<div id="definitionsDiv">
				<label style="font-size: 20px;">Définitions :</label><br>
				<select id="definitionsSelect" size="20" onclick="showTagValue()"></select><br><br>
				<input type="text" id="valueInput" /><br><br>
				<button id="updateButton" onclick="updateTrack()">Enregistrer</button>
			</div>
		</div>
	</body>
</html>

<script src="js/TrackSelector.js"></script>
<script src="js/library.js"></script>
<script>
	if ('serviceWorker' in navigator) {
		navigator.serviceWorker.register('./sw.js');
	};
</script>
