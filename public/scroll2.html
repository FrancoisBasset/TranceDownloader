<!DOCTYPE html>
<html>
	<head>
		<title>TranceDownloader | Téléchargement</title>
		<style>
			* {
				font-family: monospace;
				border: none;
				outline: none;
			}

			body {
				margin: 0px;
			}

			table {
				color: white;
				font-size: 16px;
			}

			#searchDiv {
				position: absolute;
				width: 100%;
				height: 15%;

				background-color: rgb(66, 9, 62);
				text-align: center;
				padding-top: 35px;
			}

			#resultsDiv {
				position: absolute;
				width: 50%;
				height: 85%;
				top: 15%;
				
				background-color: rgb(4, 14, 71);
			}

			#downloadDiv {
				position: absolute;
				width: 50%;
				height: 85%;
				top: 15%;
				right: 0;

				background-color: red;
			}

			#searchInput {
				width: 700px;
				height: 50px;
				font-size: 20px;
			}

			#searchButton {
				width: 200px;
				height: 55px;
				font-size: 20px;
			}
		</style>
	</head>

	<body id="scroll2">
		<div id="searchDiv">
			<input type="text" id="searchInput" autocomplete="off" autofocus />
			<button id="searchButton" onclick="search()">Rechercher</button>
		</div>

		<div id="resultsDiv">
			<table class="scroll" id="videosTable" style="overflow: scroll;width: 50%;">
				<tbody class="scroll"></tbody>
			</table>
		</div>

		<div id="downloadDiv">
			<label>Artiste :</label>
			<br>
			<input type="text" id="artistInput" />
			<br>

			<label>Track :</label>
			<br>
			<input type="text" id="trackInput" />
			<br>

			<button onclick="download()">Télécharger</button>
		</div>
	</body>

	<script src="/js/scroll.js"></script>
	<script>
		if (script2 == undefined) {
			var script2 = document.createElement('script');
			script2.src = '/js/VideosTable.js';
			document.body.appendChild(script2);
		}
		
		script2 = document.createElement('script');
		script2.src = '/js/scroll2.js';
		document.body.appendChild(script2);
	</script>
</html>
