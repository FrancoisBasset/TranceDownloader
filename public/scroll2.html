<!DOCTYPE html>
<html>
	<head>
		<title>TranceDownloader | Téléchargement</title>
		<style>
			* {
				font-family: monospace;
				border: none;
				outline: none;
			}

			body {
				margin: 0px;
			}

			table {
				color: white;
				font-size: 16px;
			}

			#searchDiv {
				position: absolute;
				width: 100%;
				height: 15%;

				background-color: rgb(66, 9, 62);
				text-align: center;
				padding-top: 35px;
			}

			#resultsDiv {
				position: absolute;
				width: 50%;
				height: 85%;
				top: 15%;
				
				background-color: rgb(4, 14, 71);
				overflow: scroll;
			}

			::-webkit-scrollbar {
				width: 0;
			}

			#downloadDiv {
				position: absolute;
				width: 50%;
				height: 85%;
				top: 15%;
				right: 0;

				background-color: rgb(75, 17, 36);
				text-align: center;
			}

			#searchInput {
				width: 700px;
				height: 50px;
				font-size: 20px;
			}

			input[type="text"] {
				width: 300px;
				height: 30px;
				border-radius: 10px;
				border: none;
				margin: 2px;
			}

			label, h1, table {
				color: white;
			}

			button {
				width: 150px;
				height: 30px;
				border: none;
				border-radius: 5px;
				font-size: 16px;
				margin: 2px;
				cursor: pointer;
			}
		</style>
	</head>

	<body id="scroll2">
		<div id="searchDiv">
			<input type="text" id="searchInput" autocomplete="off" readonly />
		</div>

		<div id="resultsDiv" class="scroll">
			<table class="scroll" id="videosTable" style="overflow: scroll;width: 50%;">
				<tbody class="scroll"></tbody>
			</table>
		</div>

		<div id="downloadDiv">
			<h1>Télécharger</h1>

			<label>Artiste :</label>
			<input type="text" id="artistInput" />
			<br>

			<label>Track :</label>
			<input type="text" id="trackInput" />
			<br>

			<button onclick="download()">Télécharger</button>
		</div>
	</body>

	<script src="/js/scroll.js"></script>
	<script>
		if (script2 == undefined) {
			var script2 = document.createElement('script');
			script2.src = '/js/VideosTable.js';
			document.body.appendChild(script2);
		}
		
		script2 = document.createElement('script');
		script2.src = '/js/scroll2.js';
		document.body.appendChild(script2);
	</script>
</html>
